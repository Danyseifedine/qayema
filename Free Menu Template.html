<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Olive &amp; Thyme — Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #F5F5F4;
    --surface: #FFFFFF;
    --surface-2: #F0F0EF;
    --ink: #1E1B18;
    --muted: #8A8076;
    --muted-2: #B4ABA0;
    --accent: #C75D3A;
    --accent-dark: #A4492B;
    --accent-soft: #F7E7DE;
    --green: #3E7C5A;
    --green-soft: #E4F0E8;
    --border: #ECEBE9;
    --border-strong: #DEDDDA;
    --shadow-sm: 0 1px 2px rgba(20,18,16,.05), 0 1px 1px rgba(20,18,16,.03);
    --shadow-md: 0 4px 16px rgba(20,18,16,.07);
    --shadow-lg: 0 12px 40px rgba(20,18,16,.14);
    --r-sm: 10px;
    --r-md: 16px;
    --r-lg: 22px;
    --maxw: 1120px;
    --font-display: "DM Serif Display", Georgia, serif;
    --font-ui: "Hanken Grotesk", system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  #root { min-height: 100%; }
  img { display: block; max-width: 100%; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input { font-family: inherit; }
  ::selection { background: var(--accent-soft); }

  /* ---------- App shell ---------- */
  .app { max-width: 520px; margin: 0 auto; background: var(--bg); position: relative; padding-bottom: 120px; }
  @media (min-width: 880px) {
    .app { max-width: var(--maxw); padding-bottom: 56px; }
  }

  /* ---------- Top bar ---------- */
  .topbar {
    position: sticky; top: 0; z-index: 40;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px;
    background: rgba(245,245,244,.82);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid transparent;
    transition: border-color .25s, box-shadow .25s;
  }
  .topbar.scrolled { border-bottom-color: var(--border); box-shadow: var(--shadow-sm); }
  .topbar__brand { display: flex; align-items: center; gap: 10px; opacity: 0; transform: translateY(-4px); transition: opacity .3s, transform .3s; pointer-events: none; }
  .topbar.scrolled .topbar__brand { opacity: 1; transform: none; }
  .topbar__mark { width: 30px; height: 30px; border-radius: 9px; background: var(--ink); color: #fff; display: grid; place-items: center; font-family: var(--font-display); font-size: 16px; line-height: 1; }
  .topbar__name { font-weight: 700; font-size: 15px; letter-spacing: -.01em; }
  .topbar__cart {
    position: relative; display: grid; place-items: center;
    width: 42px; height: 42px;
    background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow-sm);
    border-radius: 50%;
    transition: transform .15s, box-shadow .2s;
  }
  .topbar__cart:active { transform: scale(.92); }
  .topbar__cart svg { width: 18px; height: 18px; }
  .topbar__badge {
    position: absolute; top: -6px; right: -6px; min-width: 19px; height: 19px; padding: 0 5px;
    background: var(--accent); color: #fff; border-radius: 999px; font-size: 11px; font-weight: 800;
    display: grid; place-items: center; border: 2px solid var(--bg);
  }

  /* ---------- Logo + banner ---------- */
  .hero { padding: 4px 18px 0; }
  @media (min-width: 880px) { .hero { padding: 8px 32px 0; } }
  .logo {
    width: 78px; height: 78px; margin: 6px auto 16px; border-radius: 20px;
    background: var(--ink); color: #fff; display: grid; place-items: center;
    box-shadow: var(--shadow-md); position: relative;
  }
  .logo__inner { font-family: var(--font-display); font-size: 34px; line-height: 1; }
  .logo__ring { position: absolute; inset: -5px; border-radius: 25px; border: 1.5px solid var(--border-strong); }

  .banner {
    position: relative; border-radius: var(--r-lg); overflow: hidden;
    aspect-ratio: 16 / 10; background: var(--surface-2); box-shadow: var(--shadow-md);
  }
  @media (min-width: 880px) { .banner { aspect-ratio: 21 / 7; } }
  .banner img { width: 100%; height: 100%; object-fit: cover; }
  .banner::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(20,18,16,0) 60%, rgba(20,18,16,.18)); }
  .banner__season {
    position: absolute; top: 14px; left: 14px; z-index: 2; display: inline-flex; align-items: center; gap: 7px;
    background: rgba(255,255,255,.92); backdrop-filter: blur(6px);
    padding: 7px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; color: var(--accent-dark);
    box-shadow: var(--shadow-sm); white-space: nowrap;
  }
  .banner__season .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }

  /* ---------- Identity card ---------- */
  .identity { margin: -38px 16px 0; position: relative; z-index: 3; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 20px 20px 18px; box-shadow: var(--shadow-md); }
  @media (min-width: 880px) {
    .identity { margin: -54px 32px 0; display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 28px; padding: 26px 30px; }
  }
  .identity__head { display: flex; align-items: center; gap: 14px; }
  .identity__logo { width: 52px; height: 52px; flex: none; border-radius: 15px; background: var(--ink); color: #fff; display: grid; place-items: center; font-family: var(--font-display); font-size: 26px; line-height: 1; box-shadow: var(--shadow-sm); }
  @media (min-width: 880px) { .identity__logo { width: 60px; height: 60px; font-size: 30px; } }
  .identity__title { font-family: var(--font-display); font-size: 29px; line-height: 1.05; letter-spacing: -.01em; }
  @media (min-width: 880px) { .identity__title { font-size: 38px; } }
  .identity__desc { color: var(--muted); font-size: 14.5px; margin-top: 14px; max-width: 56ch; }
  .identity__meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
  .chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 600; padding: 6px 11px; border-radius: 999px; background: var(--surface-2); color: #5e564d; }
  .chip svg { width: 14px; height: 14px; }
  .chip--open { background: var(--green-soft); color: var(--green); }
  .chip--open .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 0 rgba(62,124,90,.5); animation: pulse 2.2s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(62,124,90,.45); } 70% { box-shadow: 0 0 0 7px rgba(62,124,90,0); } 100% { box-shadow: 0 0 0 0 rgba(62,124,90,0); } }

  .socials { display: flex; gap: 9px; margin-top: 16px; }
  @media (min-width: 880px) { .socials { margin-top: 0; } }
  .social {
    width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center;
    background: var(--surface-2); color: #5e564d; transition: transform .16s, background .2s, color .2s;
  }
  .social:hover { transform: translateY(-3px); background: var(--ink); color: #fff; }
  .social svg { width: 19px; height: 19px; }

  /* ---------- Hours strip ---------- */
  .infozone { margin: 16px 16px 0; }
  @media (min-width: 880px) { .infozone { margin: 22px 32px 0; max-width: 360px; } }
  .infocard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 15px 16px; box-shadow: var(--shadow-sm); }
  .infocard__label { display: flex; align-items: center; gap: 7px; font-size: 11.5px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); }
  .infocard__label svg { width: 14px; height: 14px; color: var(--accent); }
  .hours-row { display: flex; align-items: center; justify-content: space-between; font-size: 13.5px; margin-top: 9px; }
  .hours-row span:first-child { color: #5e564d; }
  .hours-row span:last-child { font-weight: 600; }
  .hours-row.today { color: var(--green); font-weight: 700; }
  .hours-row.today span { color: var(--green); }
  .promo__range { font-family: var(--font-display); font-size: 19px; margin-top: 8px; line-height: 1.15; }
  .promo__sub { color: var(--muted); font-size: 12.5px; margin-top: 4px; }
  .promo__bar { height: 6px; border-radius: 999px; background: var(--surface-2); margin-top: 12px; overflow: hidden; }
  .promo__fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent), #E08A4D); }

  /* ---------- Search ---------- */
  .searchwrap { margin: 18px 16px 0; }
  @media (min-width: 880px) { .searchwrap { margin: 26px 32px 0; max-width: 520px; } }
  .search {
    display: flex; align-items: center; gap: 10px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 14px; padding: 0 14px; height: 50px;
    box-shadow: var(--shadow-sm); transition: border-color .2s, box-shadow .2s;
  }
  .search:focus-within { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
  .search svg { width: 18px; height: 18px; color: var(--muted); flex: none; }
  .search input { border: none; outline: none; flex: 1; font-size: 15px; background: transparent; color: var(--ink); }
  .search input::placeholder { color: var(--muted-2); }
  .search__clear { width: 26px; height: 26px; border-radius: 50%; background: var(--surface-2); color: var(--muted); display: grid; place-items: center; font-size: 14px; flex: none; }

  /* ---------- Sticky tabs ---------- */
  .tabs {
    position: sticky; top: 56px; z-index: 30; margin-top: 18px;
    background: rgba(245,245,244,.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid transparent; border-bottom: 1px solid var(--border);
  }
  .tabs__scroll { display: flex; gap: 8px; overflow-x: auto; padding: 11px 16px; scrollbar-width: none; max-width: var(--maxw); margin: 0 auto; }
  .tabs__scroll::-webkit-scrollbar { display: none; }
  @media (min-width: 880px) { .tabs__scroll { padding: 13px 32px; } }
  .tab {
    flex: none; padding: 9px 16px; border-radius: 999px; font-size: 13.5px; font-weight: 600;
    color: #6c645b; background: transparent; border: 1px solid var(--border-strong);
    white-space: nowrap; transition: all .18s;
  }
  .tab:hover { border-color: var(--accent); color: var(--accent-dark); }
  .tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .tab__count { opacity: .55; font-weight: 700; margin-left: 4px; }

  /* ---------- Menu sections ---------- */
  .menu { padding: 6px 16px 0; }
  @media (min-width: 880px) { .menu { padding: 10px 32px 0; } }
  .section { scroll-margin-top: 116px; padding-top: 26px; }
  .section__head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  .section__title { font-family: var(--font-display); font-size: 25px; letter-spacing: -.01em; }
  .section__rule { flex: 1; height: 1px; background: var(--border); }
  .section__count { font-size: 12.5px; font-weight: 600; color: var(--muted); }

  .dishgrid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 600px) { .dishgrid { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 880px) { .dishgrid { grid-template-columns: 1fr 1fr 1fr; gap: 16px; } }

  .dish {
    display: flex; gap: 14px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r-md); padding: 12px; box-shadow: var(--shadow-sm);
    transition: transform .2s cubic-bezier(.2,.7,.3,1), box-shadow .2s, border-color .2s;
  }
  .dish:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--border-strong); }
  @media (min-width: 600px) { .dish { flex-direction: column; padding: 0; overflow: hidden; gap: 0; } }

  .dish__media { position: relative; flex: none; width: 92px; height: 92px; border-radius: 12px; overflow: hidden; background: var(--surface-2); }
  @media (min-width: 600px) { .dish__media { width: 100%; height: 150px; border-radius: 0; } }
  .dish__media img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s; }
  .dish:hover .dish__media img { transform: scale(1.05); }
  .dish__ph { position: absolute; inset: 0; display: grid; place-items: center; background: linear-gradient(135deg, var(--surface-2), #E5E5E3); color: var(--muted-2); }
  .dish__ph svg { width: 34px; height: 34px; }
  .dish__tag { position: absolute; top: 8px; left: 8px; background: rgba(255,255,255,.94); color: var(--accent-dark); font-size: 10.5px; font-weight: 800; letter-spacing: .03em; text-transform: uppercase; padding: 4px 8px; border-radius: 999px; box-shadow: var(--shadow-sm); }

  .dish__body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  @media (min-width: 600px) { .dish__body { padding: 13px 14px 14px; } }
  .dish__name { font-weight: 700; font-size: 15.5px; letter-spacing: -.01em; }
  .dish__desc { color: var(--muted); font-size: 13px; margin-top: 3px; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .dish__foot { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 12px; gap: 10px; }
  .dish__price { font-weight: 800; font-size: 16px; }
  .dish__price small { font-weight: 600; color: var(--muted); font-size: 11.5px; }

  .addbtn {
    flex: none; display: inline-flex; align-items: center; gap: 6px; height: 36px; padding: 0 14px;
    border-radius: 10px; background: var(--accent-soft); color: var(--accent-dark); font-weight: 700; font-size: 13px;
    transition: transform .14s, background .2s, color .2s;
  }
  .addbtn:hover { background: var(--accent); color: #fff; }
  .addbtn:active { transform: scale(.94); }
  .addbtn svg { width: 15px; height: 15px; }

  .stepper { display: inline-flex; align-items: center; gap: 0; height: 36px; border-radius: 10px; background: var(--ink); color: #fff; overflow: hidden; }
  .stepper button { width: 34px; height: 36px; display: grid; place-items: center; font-size: 17px; font-weight: 700; transition: background .15s; }
  .stepper button:hover { background: rgba(255,255,255,.16); }
  .stepper span { min-width: 22px; text-align: center; font-weight: 800; font-size: 14px; }

  /* ---------- Skeleton / loading ---------- */
  .sk { background: linear-gradient(100deg, var(--surface-2) 30%, #E7E7E5 50%, var(--surface-2) 70%); background-size: 200% 100%; animation: shimmer 1.3s infinite; border-radius: 8px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .sk-dish { display: flex; gap: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 12px; }
  .sk-dish .sk-img { width: 92px; height: 92px; border-radius: 12px; flex: none; }
  .sk-dish .sk-lines { flex: 1; display: flex; flex-direction: column; gap: 9px; padding-top: 4px; }

  /* ---------- Empty state ---------- */
  .empty { text-align: center; padding: 56px 24px; }
  .empty__icon { width: 72px; height: 72px; margin: 0 auto 18px; border-radius: 22px; background: var(--surface); border: 1px solid var(--border); display: grid; place-items: center; box-shadow: var(--shadow-sm); }
  .empty__icon svg { width: 32px; height: 32px; color: var(--muted-2); }
  .empty__title { font-family: var(--font-display); font-size: 22px; }
  .empty__text { color: var(--muted); font-size: 14px; margin-top: 6px; }
  .empty__btn { margin-top: 18px; display: inline-flex; align-items: center; gap: 7px; padding: 11px 18px; border-radius: 12px; background: var(--ink); color: #fff; font-weight: 700; font-size: 14px; }

  /* ---------- Footer ---------- */
  .foot { text-align: center; padding: 40px 24px 16px; color: var(--muted-2); font-size: 12.5px; }
  .foot a { color: var(--muted); font-weight: 700; text-decoration: none; }
  .foot__powered { margin-top: 12px; display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; padding: 6px 12px; border-radius: 999px; background: var(--surface); border: 1px solid var(--border); }
  .foot__powered b { color: var(--ink); }

  /* ---------- WhatsApp / cart bar ---------- */
  .wabar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 45;
    display: flex; justify-content: center; padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
    pointer-events: none;
    background: linear-gradient(180deg, rgba(245,245,244,0), rgba(245,245,244,.94) 55%);
  }
  .wabar__inner { pointer-events: auto; width: 100%; max-width: 488px; display: flex; gap: 10px; }
  @media (min-width: 880px) { .wabar { padding-bottom: 26px; } .wabar__inner { max-width: 560px; } }
  .wa-cart {
    flex: 1; display: flex; align-items: center; justify-content: space-between; gap: 12px;
    height: 58px; padding: 0 8px 0 18px; border-radius: 16px; background: var(--ink); color: #fff;
    box-shadow: var(--shadow-lg); transition: transform .16s;
  }
  .wa-cart:active { transform: scale(.985); }
  .wa-cart__left { display: flex; align-items: center; gap: 11px; min-width: 0; }
  .wa-cart__count { width: 30px; height: 30px; border-radius: 9px; background: rgba(255,255,255,.16); display: grid; place-items: center; font-weight: 800; font-size: 14px; flex: none; }
  .wa-cart__txt { display: flex; flex-direction: column; line-height: 1.15; min-width: 0; }
  .wa-cart__txt small { font-size: 11px; color: rgba(255,255,255,.6); font-weight: 600; }
  .wa-cart__txt b { font-size: 15px; }
  .wa-cart__go { display: inline-flex; align-items: center; gap: 7px; height: 42px; padding: 0 16px; border-radius: 11px; background: #25D366; color: #07321a; font-weight: 800; font-size: 14px; flex: none; }
  .wa-cart__go svg { width: 18px; height: 18px; }

  .wa-empty { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 9px; height: 58px; border-radius: 16px; background: #25D366; color: #06311a; font-weight: 800; font-size: 15px; box-shadow: var(--shadow-lg); transition: transform .16s; }
  .wa-empty:active { transform: scale(.985); }
  .wa-empty svg { width: 21px; height: 21px; }

  /* ---------- Cart drawer ---------- */
  .scrim { position: fixed; inset: 0; z-index: 60; background: rgba(34,28,23,.5); backdrop-filter: blur(3px); opacity: 0; pointer-events: none; transition: opacity .3s; }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 61; background: var(--bg);
    border-radius: 26px 26px 0 0; box-shadow: var(--shadow-lg); transform: translateY(102%);
    transition: transform .36s cubic-bezier(.2,.8,.25,1); max-height: 88vh; display: flex; flex-direction: column;
  }
  .drawer.open { transform: none; }
  @media (min-width: 880px) {
    .drawer { left: auto; right: 0; top: 0; bottom: 0; width: 420px; border-radius: 0; transform: translateX(102%); max-height: none; }
    .drawer.open { transform: none; }
  }
  .drawer__grip { width: 42px; height: 5px; border-radius: 999px; background: var(--border-strong); margin: 10px auto 2px; }
  @media (min-width: 880px) { .drawer__grip { display: none; } }
  .drawer__head { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); }
  .drawer__head h3 { font-family: var(--font-display); font-size: 23px; }
  .drawer__close { width: 34px; height: 34px; border-radius: 10px; background: var(--surface-2); display: grid; place-items: center; }
  .drawer__close svg { width: 16px; height: 16px; }
  .drawer__body { overflow-y: auto; padding: 8px 16px; flex: 1; }
  .citem { display: flex; gap: 12px; padding: 13px 4px; border-bottom: 1px solid var(--border); }
  .citem:last-child { border-bottom: none; }
  .citem__img { width: 50px; height: 50px; border-radius: 11px; object-fit: cover; flex: none; background: var(--surface-2); }
  .citem img { width: 50px; height: 50px; border-radius: 11px; object-fit: cover; flex: none; }
  .citem__ph { width: 50px; height: 50px; border-radius: 11px; flex: none; background: linear-gradient(135deg, var(--surface-2), #E5E5E3); display: grid; place-items: center; color: var(--muted-2); }
  .citem__ph svg { width: 24px; height: 24px; }
  .citem__mid { flex: 1; min-width: 0; }
  .citem__name { font-weight: 700; font-size: 14.5px; }
  .citem__price { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .citem__right { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; }
  .citem__sum { font-weight: 800; font-size: 14.5px; }
  .stepper--sm { height: 30px; background: var(--surface-2); color: var(--ink); border: 1px solid var(--border); }
  .stepper--sm button { width: 28px; height: 28px; font-size: 15px; }
  .stepper--sm button:hover { background: var(--border); }
  .stepper--sm span { font-size: 13px; }

  .drawer__foot { border-top: 1px solid var(--border); padding: 16px 20px calc(18px + env(safe-area-inset-bottom)); background: var(--surface); }
  .totrow { display: flex; align-items: center; justify-content: space-between; font-size: 14px; margin-bottom: 7px; color: #5e564d; }
  .totrow.grand { font-size: 19px; font-weight: 800; color: var(--ink); margin-top: 10px; margin-bottom: 16px; }
  .totrow.grand .f { font-family: var(--font-display); font-weight: 400; }
  .checkout { width: 100%; height: 56px; border-radius: 15px; background: #25D366; color: #06311a; font-weight: 800; font-size: 16px; display: inline-flex; align-items: center; justify-content: center; gap: 10px; transition: transform .15s; }
  .checkout:active { transform: scale(.985); }
  .checkout svg { width: 20px; height: 20px; }
  .drawer__note { text-align: center; font-size: 11.5px; color: var(--muted); margin-top: 10px; }

  .cart-empty { text-align: center; padding: 48px 24px 30px; }
  .cart-empty__icon { width: 64px; height: 64px; margin: 0 auto 16px; border-radius: 18px; background: var(--surface); border: 1px solid var(--border); display: grid; place-items: center; }
  .cart-empty__icon svg { width: 28px; height: 28px; color: var(--muted-2); }

  /* entrance — resting state is visible; animation only plays from hidden when it runs */
  .reveal { animation: rise .55s cubic-bezier(.2,.7,.3,1); }
  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { .reveal { animation: none; opacity: 1; transform: none; } .sk, .promo__fill, .chip--open .dot { animation: none; } }

  .toast {
    position: fixed; left: 50%; bottom: 92px; z-index: 70;
    background: var(--ink); color: #fff; padding: 11px 18px; border-radius: 999px; font-size: 13.5px; font-weight: 600;
    box-shadow: var(--shadow-lg); opacity: 0; transform: translateX(-50%) translateY(20px); pointer-events: none; transition: opacity .25s, transform .25s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast svg { width: 16px; height: 16px; color: #25D366; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

/* ----------------------------- Icons ----------------------------- */
const I = {
  cart: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>,
  search: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
  plus: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" {...p}><path d="M12 5v14M5 12h14"/></svg>,
  clock: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>,
  cal: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>,
  whats: (p) => <svg viewBox="0 0 24 24" fill="currentColor" {...p}><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38a9.9 9.9 0 0 0 4.79 1.22h.01c5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0 0 12.04 2Zm0 18.15h-.01a8.2 8.2 0 0 1-4.18-1.15l-.3-.18-3.11.82.83-3.04-.2-.31a8.2 8.2 0 0 1-1.26-4.38c0-4.54 3.7-8.23 8.24-8.23 2.2 0 4.27.86 5.82 2.42a8.18 8.18 0 0 1 2.41 5.82c0 4.54-3.7 8.23-8.24 8.23Zm4.52-6.16c-.25-.12-1.47-.72-1.69-.81-.23-.08-.39-.12-.56.12-.16.25-.64.81-.79.98-.14.16-.29.18-.54.06-.25-.12-1.05-.39-1.99-1.23-.74-.66-1.23-1.47-1.38-1.72-.14-.25-.01-.38.11-.5.11-.11.25-.29.37-.43.12-.14.16-.25.25-.41.08-.16.04-.31-.02-.43-.06-.12-.56-1.34-.76-1.84-.2-.48-.41-.42-.56-.43h-.48c-.16 0-.43.06-.65.31-.22.25-.85.84-.85 2.05 0 1.21.88 2.38 1 2.54.12.16 1.73 2.64 4.19 3.7.59.25 1.04.4 1.4.52.59.19 1.12.16 1.54.1.47-.07 1.47-.6 1.68-1.18.21-.58.21-1.07.14-1.18-.06-.1-.22-.16-.47-.28Z"/></svg>,
  insta: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="3.5"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>,
  fb: (p) => <svg viewBox="0 0 24 24" fill="currentColor" {...p}><path d="M14 9h3V5.5h-3c-2 0-3.5 1.6-3.5 3.6V11H8v3.5h2.5V22H14v-7.5h2.7l.3-3.5H14V9.4c0-.3.2-.4.5-.4Z"/></svg>,
  tiktok: (p) => <svg viewBox="0 0 24 24" fill="currentColor" {...p}><path d="M16.5 3c.3 2 1.6 3.6 3.5 3.9v2.6c-1.3 0-2.5-.4-3.5-1v5.9c0 3-2.3 5.4-5.2 5.4S6 17.4 6 14.5s2.3-5.4 5.2-5.4c.3 0 .5 0 .8.05v2.7c-.25-.08-.5-.12-.8-.12-1.5 0-2.6 1.25-2.6 2.79s1.1 2.78 2.6 2.78c1.5 0 2.7-1.2 2.7-2.78V3h2.6Z"/></svg>,
  web: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18 14 14 0 0 1 0-18Z"/></svg>,
  x: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" {...p}><path d="M18 6 6 18M6 6l12 12"/></svg>,
  bowl: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 11h18a9 9 0 0 1-18 0Z"/><path d="M12 4c-1.5 0-2 1-2 2M16 5c-1 0-1.2.7-1.2 1.4M8 6c-.8 0-1 .6-1 1"/></svg>,
  bag: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M6 7h12l1 13H5L6 7Z"/><path d="M9 7V6a3 3 0 0 1 6 0v1"/></svg>,
  check: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M20 6 9 17l-5-5"/></svg>,
};

/* ----------------------------- Data ----------------------------- */
const RESTAURANT = {
  name: "Olive & Thyme",
  mark: "O",
  desc: "Small plates, slow-brewed coffee, and fresh bread baked every morning in the heart of the old town.",
  banner: "https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=1200&q=70&auto=format&fit=crop",
  currency: "$",
  phone: "15551234567",
  hours: "07:00 — 22:00",
};

const CATEGORIES = [
  { id: "breakfast", name: "Breakfast" },
  { id: "brunch", name: "Brunch Plates" },
  { id: "bakery", name: "Bakery" },
  { id: "drinks", name: "Coffee & Drinks" },
  { id: "desserts", name: "Desserts" },
];

const DISHES = [
  { cat: "breakfast", name: "Buttermilk Pancakes", desc: "Stacked fluffy pancakes, maple butter, seasonal berries & toasted pecans.", price: 11.5, tag: "Popular", img: "https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=600&q=70&auto=format&fit=crop" },
  { cat: "breakfast", name: "Avocado Smash", desc: "Sourdough toast, smashed avocado, chili flakes, lime & poached egg.", price: 12, img: "https://images.unsplash.com/photo-1588137378633-dea1336ce1e2?w=600&q=70&auto=format&fit=crop" },
  { cat: "breakfast", name: "Açaí Bowl", desc: "Frozen açaí, banana, granola, coconut & a drizzle of honey.", price: 9.5, tag: "Vegan", img: "https://images.unsplash.com/photo-1511690743698-d9d85f2fbf38?w=600&q=70&auto=format&fit=crop" },
  { cat: "brunch", name: "Eggs Benedict", desc: "Two poached eggs, smoked ham, hollandaise on a toasted muffin.", price: 14, img: "https://images.unsplash.com/photo-1608039829572-78524f79c4c7?w=600&q=70&auto=format&fit=crop" },
  { cat: "brunch", name: "Garden Grain Bowl", desc: "Quinoa, roasted veg, hummus, pickles & herb tahini dressing.", price: 13.5, tag: "Vegan", img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=600&q=70&auto=format&fit=crop" },
  { cat: "brunch", name: "Classic Smash Burger", desc: "Double beef patty, aged cheddar, house sauce, brioche & fries.", price: 16, tag: "Chef's pick", img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600&q=70&auto=format&fit=crop" },
  { cat: "bakery", name: "Butter Croissant", desc: "72-hour laminated dough, baked golden every morning.", price: 4.5, img: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=600&q=70&auto=format&fit=crop" },
  { cat: "bakery", name: "Sourdough Loaf", desc: "Slow-fermented, crackling crust, soft open crumb. Whole loaf.", price: 7, img: "https://images.unsplash.com/photo-1585478259715-876acc5be8eb?w=600&q=70&auto=format&fit=crop" },
  { cat: "bakery", name: "Cinnamon Roll", desc: "Soft swirl, brown sugar, cream cheese glaze.", price: 5, tag: "Popular", img: "https://images.unsplash.com/photo-1509365465985-25d11c17e812?w=600&q=70&auto=format&fit=crop" },
  { cat: "drinks", name: "Flat White", desc: "Double ristretto, silky steamed milk, micro-foam art.", price: 4, img: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=600&q=70&auto=format&fit=crop" },
  { cat: "drinks", name: "Iced Matcha Latte", desc: "Ceremonial matcha, oat milk, over ice.", price: 5.5, tag: "New", img: "https://images.unsplash.com/photo-1536013455962-7d2b9d8f0bef?w=600&q=70&auto=format&fit=crop" },
  { cat: "drinks", name: "Fresh Orange Juice", desc: "Cold-pressed daily, nothing added.", price: 4.5, img: "https://images.unsplash.com/photo-1613478223719-2ab802602423?w=600&q=70&auto=format&fit=crop" },
  { cat: "desserts", name: "New York Cheesecake", desc: "Dense vanilla bean cheesecake, berry compote.", price: 7.5, tag: "Popular", img: "https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=600&q=70&auto=format&fit=crop" },
  { cat: "desserts", name: "Chocolate Fondant", desc: "Warm molten centre, vanilla gelato.", price: 8, img: "https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=600&q=70&auto=format&fit=crop" },
].map((d, i) => ({ ...d, id: "d" + i }));

const money = (n) => RESTAURANT.currency + n.toFixed(2);

/* ----------------------------- Small components ----------------------------- */
function Img({ src, alt, ph }) {
  const [err, setErr] = useState(false);
  if (err || !src) return <div className={ph.cls}>{ph.icon}</div>;
  return <img src={src} alt={alt} loading="lazy" onError={() => setErr(true)} />;
}

function Stepper({ qty, onAdd, onSub, small }) {
  return (
    <div className={"stepper" + (small ? " stepper--sm" : "")}>
      <button onClick={onSub} aria-label="Decrease">–</button>
      <span>{qty}</span>
      <button onClick={onAdd} aria-label="Increase">+</button>
    </div>
  );
}

function Dish({ d, qty, onAdd, onSub }) {
  return (
    <article className="dish">
      <div className="dish__media">
        <Img src={d.img} alt={d.name} ph={{ cls: "dish__ph", icon: <I.bowl /> }} />
        {d.tag && <span className="dish__tag">{d.tag}</span>}
      </div>
      <div className="dish__body">
        <h3 className="dish__name">{d.name}</h3>
        <p className="dish__desc">{d.desc}</p>
        <div className="dish__foot">
          <div className="dish__price">{money(d.price)}</div>
          {qty > 0
            ? <Stepper qty={qty} onAdd={onAdd} onSub={onSub} />
            : <button className="addbtn" onClick={onAdd}><I.plus /> Add</button>}
        </div>
      </div>
    </article>
  );
}

function SkeletonSection() {
  return (
    <div className="section" style={{ paddingTop: 26 }}>
      <div className="sk" style={{ width: 160, height: 26, marginBottom: 16 }} />
      <div className="dishgrid">
        {Array.from({ length: 3 }).map((_, i) => (
          <div className="sk-dish" key={i}>
            <div className="sk sk-img" />
            <div className="sk-lines">
              <div className="sk" style={{ width: "70%", height: 15 }} />
              <div className="sk" style={{ width: "95%", height: 11 }} />
              <div className="sk" style={{ width: "55%", height: 11 }} />
              <div className="sk" style={{ width: "40%", height: 18, marginTop: "auto" }} />
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ----------------------------- App ----------------------------- */
function App() {
  const [loading, setLoading] = useState(true);
  const [scrolled, setScrolled] = useState(false);
  const [query, setQuery] = useState("");
  const [active, setActive] = useState(CATEGORIES[0].id);
  const [cart, setCart] = useState({});
  const [drawer, setDrawer] = useState(false);
  const [toast, setToast] = useState(null);
  const secRefs = useRef({});
  const tabRefs = useRef({});
  const clickScroll = useRef(false);

  useEffect(() => { const t = setTimeout(() => setLoading(false), 1300); return () => clearTimeout(t); }, []);

  useEffect(() => {
    const onScroll = () => {
      setScrolled(window.scrollY > 40);
      if (clickScroll.current) return;
      let cur = CATEGORIES[0].id;
      for (const c of CATEGORIES) {
        const el = secRefs.current[c.id];
        if (el && el.getBoundingClientRect().top <= 160) cur = c.id;
      }
      setActive(cur);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  useEffect(() => {
    const el = tabRefs.current[active];
    if (el) el.parentElement.scrollTo({ left: el.offsetLeft - 60, behavior: "smooth" });
  }, [active]);

  const flash = (msg) => { setToast(msg); clearTimeout(flash._t); flash._t = setTimeout(() => setToast(null), 1600); };

  const add = (d) => { setCart((c) => ({ ...c, [d.id]: (c[d.id] || 0) + 1 })); if (!cart[d.id]) flash(d.name + " added"); };
  const sub = (d) => setCart((c) => { const n = (c[d.id] || 0) - 1; const nc = { ...c }; if (n <= 0) delete nc[d.id]; else nc[d.id] = n; return nc; });

  const count = useMemo(() => Object.values(cart).reduce((a, b) => a + b, 0), [cart]);
  const total = useMemo(() => DISHES.reduce((s, d) => s + (cart[d.id] || 0) * d.price, 0), [cart]);
  const cartItems = useMemo(() => DISHES.filter((d) => cart[d.id]).map((d) => ({ ...d, qty: cart[d.id] })), [cart]);

  const filtered = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return null;
    return DISHES.filter((d) => (d.name + " " + d.desc).toLowerCase().includes(q));
  }, [query]);

  const goCat = (id) => {
    setActive(id);
    clickScroll.current = true;
    const el = secRefs.current[id];
    if (el) window.scrollTo({ top: el.offsetTop - 108, behavior: "smooth" });
    setTimeout(() => { clickScroll.current = false; }, 700);
  };

  const waLink = useMemo(() => {
    let txt = "Hi " + RESTAURANT.name + "! I'd like to order:%0A";
    cartItems.forEach((d) => { txt += "• " + d.qty + "× " + d.name + " — " + money(d.price * d.qty) + "%0A"; });
    txt += "%0ATotal: " + money(total);
    return "https://wa.me/" + RESTAURANT.phone + "?text=" + txt;
  }, [cartItems, total]);

  return (
    <div className="app">
      {/* Top bar */}
      <header className={"topbar" + (scrolled ? " scrolled" : "")}>
        <div className="topbar__brand">
          <div className="topbar__mark">{RESTAURANT.mark}</div>
          <div className="topbar__name">{RESTAURANT.name}</div>
        </div>
        <button className="topbar__cart" onClick={() => setDrawer(true)} aria-label="View cart">
          <I.cart />
          {count > 0 && <span className="topbar__badge">{count}</span>}
        </button>
      </header>

      {/* Hero */}
      <section className="hero">
        <div className="banner reveal" style={{ animationDelay: ".04s" }}>
          <Img src={RESTAURANT.banner} alt={RESTAURANT.name + " cover"} ph={{ cls: "dish__ph", icon: <I.bowl /> }} />
        </div>
      </section>

      {/* Identity */}
      <section className="identity reveal" style={{ animationDelay: ".08s" }}>
        <div className="identity__main">
          <div className="identity__head">
            <div className="identity__logo">{RESTAURANT.mark}</div>
            <h1 className="identity__title">{RESTAURANT.name}</h1>
          </div>
          <p className="identity__desc">{RESTAURANT.desc}</p>
        </div>
        <div className="socials">
          <a className="social" href="#" aria-label="Instagram"><I.insta /></a>
          <a className="social" href="#" aria-label="Facebook"><I.fb /></a>
          <a className="social" href="#" aria-label="TikTok"><I.tiktok /></a>
          <a className="social" href="#" aria-label="Website"><I.web /></a>
        </div>
      </section>

      {/* Hours */}
      <section className="infozone reveal" style={{ animationDelay: ".12s" }}>
        <div className="infocard">
          <div className="infocard__label"><I.clock /> Opening hours</div>
          <div className="hours-row today"><span>Open every day</span><span>{RESTAURANT.hours}</span></div>
        </div>
      </section>

      {/* Search */}
      <section className="searchwrap reveal" style={{ animationDelay: ".18s" }}>
        <div className="search">
          <I.search />
          <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search the menu…" />
          {query && <button className="search__clear" onClick={() => setQuery("")} aria-label="Clear"><I.x /></button>}
        </div>
      </section>

      {/* Sticky tabs */}
      {!filtered && (
        <nav className="tabs">
          <div className="tabs__scroll">
            {CATEGORIES.map((c) => {
              const n = DISHES.filter((d) => d.cat === c.id).length;
              return (
                <button key={c.id} ref={(el) => (tabRefs.current[c.id] = el)}
                  className={"tab" + (active === c.id ? " active" : "")} onClick={() => goCat(c.id)}>
                  {c.name}<span className="tab__count">{n}</span>
                </button>
              );
            })}
          </div>
        </nav>
      )}

      {/* Menu */}
      <main className="menu">
        {loading ? (
          <><SkeletonSection /><SkeletonSection /></>
        ) : filtered ? (
          filtered.length === 0 ? (
            <div className="empty">
              <div className="empty__icon"><I.search /></div>
              <div className="empty__title">No dishes found</div>
              <div className="empty__text">We couldn't find anything for “{query}”. Try another keyword.</div>
              <button className="empty__btn" onClick={() => setQuery("")}>Clear search</button>
            </div>
          ) : (
            <div className="section" style={{ paddingTop: 22 }}>
              <div className="section__head">
                <h2 className="section__title">Results</h2>
                <span className="section__rule" />
                <span className="section__count">{filtered.length} found</span>
              </div>
              <div className="dishgrid">
                {filtered.map((d) => <Dish key={d.id} d={d} qty={cart[d.id] || 0} onAdd={() => add(d)} onSub={() => sub(d)} />)}
              </div>
            </div>
          )
        ) : (
          CATEGORIES.map((c) => {
            const items = DISHES.filter((d) => d.cat === c.id);
            return (
              <section className="section" id={c.id} key={c.id} ref={(el) => (secRefs.current[c.id] = el)}>
                <div className="section__head">
                  <h2 className="section__title">{c.name}</h2>
                  <span className="section__rule" />
                  <span className="section__count">{items.length} items</span>
                </div>
                <div className="dishgrid">
                  {items.map((d) => <Dish key={d.id} d={d} qty={cart[d.id] || 0} onAdd={() => add(d)} onSub={() => sub(d)} />)}
                </div>
              </section>
            );
          })
        )}

        {!loading && (
          <footer className="foot">
            <div className="foot__powered">Powered by <b>Qayema</b> · Free template</div>
          </footer>
        )}
      </main>

      {/* WhatsApp / cart bar */}
      <div className="wabar">
        <div className="wabar__inner">
          {count > 0 ? (
            <button className="wa-cart" onClick={() => setDrawer(true)}>
              <span className="wa-cart__left">
                <span className="wa-cart__count">{count}</span>
                <span className="wa-cart__txt"><small>Your order</small><b>{money(total)}</b></span>
              </span>
              <span className="wa-cart__go"><I.whats /> Order</span>
            </button>
          ) : (
            <a className="wa-empty" href={"https://wa.me/" + RESTAURANT.phone} target="_blank" rel="noreferrer">
              <I.whats /> Order on WhatsApp
            </a>
          )}
        </div>
      </div>

      {/* Cart drawer */}
      <div className={"scrim" + (drawer ? " open" : "")} onClick={() => setDrawer(false)} />
      <aside className={"drawer" + (drawer ? " open" : "")} aria-hidden={!drawer}>
        <div className="drawer__grip" />
        <div className="drawer__head">
          <h3>Your order</h3>
          <button className="drawer__close" onClick={() => setDrawer(false)} aria-label="Close"><I.x /></button>
        </div>
        {cartItems.length === 0 ? (
          <div className="cart-empty">
            <div className="cart-empty__icon"><I.bag /></div>
            <div className="empty__title">Your cart is empty</div>
            <div className="empty__text">Browse the menu and tap “Add” to start your order.</div>
            <button className="empty__btn" onClick={() => setDrawer(false)}>Browse menu</button>
          </div>
        ) : (
          <>
            <div className="drawer__body">
              {cartItems.map((d) => (
                <div className="citem" key={d.id}>
                  <Img src={d.img} alt={d.name} ph={{ cls: "citem__ph", icon: <I.bowl /> }} />
                  <div className="citem__mid">
                    <div className="citem__name">{d.name}</div>
                    <div className="citem__price">{money(d.price)} each</div>
                    <div style={{ marginTop: 8 }}>
                      <Stepper qty={d.qty} small onAdd={() => add(d)} onSub={() => sub(d)} />
                    </div>
                  </div>
                  <div className="citem__right">
                    <div className="citem__sum">{money(d.price * d.qty)}</div>
                  </div>
                </div>
              ))}
            </div>
            <div className="drawer__foot">
              <div className="totrow"><span>Subtotal</span><span>{money(total)}</span></div>
              <div className="totrow"><span>Service</span><span>Free</span></div>
              <div className="totrow grand"><span>Total</span><span className="f">{money(total)}</span></div>
              <a className="checkout" href={waLink} target="_blank" rel="noreferrer"><I.whats /> Send order via WhatsApp</a>
              <div className="drawer__note">You'll confirm details &amp; payment in chat. No account needed.</div>
            </div>
          </>
        )}
      </aside>

      {/* Toast */}
      <div className={"toast" + (toast ? " show" : "")}><I.check /> {toast}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
